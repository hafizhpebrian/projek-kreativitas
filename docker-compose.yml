services:
  postgres:
    image: postgres:16-alpine
    container_name: sibook-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sibook
      POSTGRES_PASSWORD: sibook_secret
      POSTGRES_DB: sibook_db
    volumes:
      - sibook_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sibook -d sibook_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sibook_pgdata:
    driver: local
